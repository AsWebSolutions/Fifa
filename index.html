<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Football Tournament Hub</title>
    <style>
        :root {
            --bg-main: #0f172a;       /* Deep slate/navy dark mode */
            --bg-card: #1e293b;       /* Lighter slate for cards */
            --accent-live: #22c55e;   /* Vibrant live match green */
            --accent-text: #38bdf8;   /* Electric blue for highlights */
            --text-main: #f8fafc;     /* Clean white text */
            --text-muted: #94a3b8;    /* Soft gray for subtext */
            --border: #334155;        /* Subtle divider lines */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            line-height: 1.5;
        }

        /* Premium Minimalist Header */
        header {
            background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
            border-bottom: 1px solid var(--border);
            padding: 24px 20px;
            text-align: center;
        }

        header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        header p {
            margin: 6px 0 0 0;
            font-size: 14px;
            color: var(--accent-text);
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Layout Grid */
        .container {
            max-width: 1300px;
            margin: 40px auto;
            padding: 0 24px;
            display: grid;
            grid-template-columns: 1.4fr 1fr;
            gap: 32px;
        }

        @media (max-width: 968px) {
            .container { grid-template-columns: 1fr; margin: 20px auto; }
        }

        .column-title {
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: var(--text-muted);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Match Cards */
        .match-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 20px;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .match-card:hover {
            border-color: var(--accent-text);
            transform: translateY(-2px);
            box-shadow: 0 12px 20px -10px rgba(0, 0, 0, 0.5);
        }

        .match-card.active-selection {
            border-color: var(--accent-text);
            background: linear-gradient(90deg, #1e293b 0%, #172554 100%);
        }

        .match-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 18px;
        }

        .live-indicator {
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(34, 197, 94, 0.15);
            color: var(--accent-live);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .live-dot {
            width: 6px;
            height: 6px;
            background-color: var(--accent-live);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(0.9); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.4; }
            100% { transform: scale(0.9); opacity: 1; }
        }

        .match-grid {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            text-align: center;
        }

        .team-display {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .team-left { text-align: left; }
        .team-right { text-align: right; }

        .score-display {
            padding: 0 20px;
        }

        .score-numbers {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 4px;
            font-variant-numeric: tabular-nums;
        }

        .match-time {
            font-size: 12px;
            color: var(--accent-live);
            font-weight: 700;
            margin-top: 4px;
            text-transform: uppercase;
        }

        .scheduled-time {
            font-size: 13px;
            color: var(--text-muted);
            font-weight: 600;
            background: #0f172a;
            padding: 4px 12px;
            border-radius: 6px;
        }

        /* Standings Side Panel */
        .panel-box {
            background-color: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 24px;
            position: sticky;
            top: 24px;
        }

        .panel-header-title {
            font-size: 18px;
            font-weight: 700;
            margin: 0 0 20px 0;
            letter-spacing: -0.3px;
            color: var(--accent-text);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }

        th {
            color: var(--text-muted);
            font-weight: 600;
            text-align: left;
            padding: 10px 8px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 14px 8px;
            border-bottom: 1px solid rgba(51, 65, 85, 0.5);
        }

        .row-highlight {
            background: linear-gradient(90deg, rgba(56, 189, 248, 0.08) 0%, transparent 100%);
            font-weight: 600;
        }

        .row-highlight td:first-child {
            color: var(--accent-text);
        }

        .center-col { text-align: center; }
        .right-col { text-align: right; }
        .muted-num { color: var(--text-muted); font-weight: 400; }
    </style>
</head>

        <h1>Tournament Intelligence</h1>
        <p>Live Match Center</p>
    </header>

            <div id="matches-list"></div>
        </div>

        <div>
